<!-- src/app/auth/login/login.component.html -->
<div class="auth-page">
  <div class="auth-card animate-fade-in">

    <div class="auth-card__logo">🪑 OfficePrime</div>
    <h1 class="auth-card__title">Entrar na sua conta</h1>
    <p class="auth-card__sub">Bem-vindo de volta!</p>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-input" placeholder="seu@email.com" [(ngModel)]="email" name="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">
          Senha
          <a href="#" class="auth-forgot">Esqueceu?</a>
        </label>
        <div class="input-with-toggle">
          <input [type]="showPassword ? 'text' : 'password'" class="form-input" placeholder="••••••••" [(ngModel)]="password" name="password" required>
          <button type="button" class="input-toggle-btn" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      @if (error) {
        <div class="auth-error">❌ {{ error }}</div>
      }

      <button type="submit" class="btn btn--primary btn--lg btn--full" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="auth-divider"><span>ou continue com</span></div>
    <div class="auth-socials">
      <button class="btn btn--outline btn--full">🔵 Google</button>
    </div>

    <p class="auth-card__footer">
      Não tem conta? <a routerLink="/cadastro">Criar conta</a>
    </p>
  </div>
</div>
