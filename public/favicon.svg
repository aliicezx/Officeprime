<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fundo -->
  <rect width="200" height="200" rx="36" fill="#1a1a2e"/>
  <!-- Encosto da cadeira -->
  <rect x="55" y="30" width="90" height="60" rx="10" fill="none" stroke="#f0c040" stroke-width="6"/>
  <!-- Assento -->
  <rect x="45" y="100" width="110" height="20" rx="8" fill="#f0c040"/>
  <!-- Pernas -->
  <line x1="65" y1="120" x2="55" y2="165" stroke="#f0c040" stroke-width="5" stroke-linecap="round"/>
  <line x1="135" y1="120" x2="145" y2="165" stroke="#f0c040" stroke-width="5" stroke-linecap="round"/>
  <!-- Pé central -->
  <line x1="100" y1="120" x2="100" y2="155" stroke="#f0c040" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="100" cy="158" rx="28" ry="6" fill="none" stroke="#f0c040" stroke-width="4"/>
  <!-- Rodas -->
  <circle cx="72" cy="164" r="5" fill="#f0c040"/>
  <circle cx="128" cy="164" r="5" fill="#f0c040"/>
</svg>
